{% extends 'base.html' %}
{% block title %}Job Form · JaegerOS{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-xl-8">
    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body p-4 p-lg-5">
        <h1 class="h3 fw-bold mb-1">Job form</h1>
        <p class="text-muted mb-4">Create or update a job post.</p>

        <form method="post" novalidate>
          {% csrf_token %}
          {% include 'shared/bootstrap_form.html' with form=form submit_label='Save job' cancel_url='/jobs/' %}
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
