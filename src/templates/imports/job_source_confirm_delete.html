{% extends 'base.html' %}
{% block title %}Delete Source · JaegerOS{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-7 col-xl-6">
    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body p-4 p-lg-5">
        <h1 class="h3 fw-bold mb-3">Delete source</h1>
        <p class="text-muted mb-4">Are you sure you want to delete <strong>{{ object.name }}</strong>?</p>

        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Delete</button>
          <a href="{% url 'source-detail' object.pk %}" class="btn btn-outline-secondary ms-2">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
