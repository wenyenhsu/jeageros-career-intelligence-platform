{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-6">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4 p-lg-5">
        <h1 class="h3">Delete user</h1>
        <p class="text-secondary mb-4">Are you sure you want to delete <strong>{{ object.username }}</strong>?</p>
        <form method="post">
          {% csrf_token %}
          <button class="btn btn-danger" type="submit">Delete</button>
          <a class="btn btn-outline-secondary ms-2" href="{% url 'user-list' %}">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
